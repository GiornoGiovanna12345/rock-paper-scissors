<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Rock Paper Scissors</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
    <div class="game-wrapper">
    <div class="top-bar">
        <div class="score user-score">
            You: <span id="userScore">0</span>
        </div>

        <div class="score computer-score">
            Computer: <span id="computerScore">0</span>
        </div>
    </div>

    <div class="game-area">

        <div class="computer-panel">
            <h2>Computer</h2>
            <img id="computerImage" src="" alt="">
            <p id="computerChoice"></p>
        </div>

        <div class="user-panel">
            <h2>You</h2>

            <div class="buttons">
                <button class="btn rock"><i class="fa-solid fa-hand-back-fist"></i></button>
                <button class="btn paper"><i class="fa-solid fa-hand"></i></button>
                <button class="btn scissors"><i class="fa-solid fa-hand-scissors"></i></button>
            </div>

            <img id="userImage" src="" alt="">
            <p id="userChoice"></p>
        </div>

    </div>


    <div class="bottom-panel">
        <p id="roundDisplay">Round: 1</p>
        <p id="countdown"></p>
        <p id="roundResult"></p>

        <div id="finalResult" style="display: none;">
            <h3 id="winnerText"></h3>
            <button id="replayBtn">Replay</button>
            <button id="bestOfFiveBtn">Best of 5</button>
        </div>
    </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
